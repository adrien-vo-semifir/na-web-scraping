# Service statique SPA pour Workflow Builder (apps/demo, build Vite).
# Conf standard mono-page : on sert les fichiers réels, et toute route inconnue
# retombe sur index.html (routage côté client).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets versionnés par hash (Vite) : cache long immuable.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : fichier réel sinon repli sur l'app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
