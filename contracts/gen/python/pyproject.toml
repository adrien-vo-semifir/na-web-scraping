# Paquet Python du vocabulaire partagé (contrats d'acquisition générés).
#
# Équivalent Python de contracts/gen/go : modèles pydantic miroirs des .proto
# (package acquisition.v1). ZÉRO dépendance Temporal. Installé comme dépendance
# par chemin depuis les moteurs de core/ (ex. core/http-fetcher-py).
#
# Note : normalement généré par `buf generate` ; écrit à la main ici car buf/protoc
# ne sont pas disponibles (cf. acquisitionv1/__init__.py).

[project]
name = "acquisition-contracts"
version = "0.1.0"
description = "Contrats d'acquisition (acquisition.v1) — modèles pydantic miroirs des .proto"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Le paquet importable est `acquisitionv1`, à la racine de ce dossier.
packages = ["acquisitionv1"]

[tool.uv]
# Paquet autonome : NE PAS hériter d'un éventuel workspace uv parent.
package = true
