summary: Acquisition — cascade d'escalade [For-loop + arrêt anticipé visibles]
description: 'Escalade en nœuds natifs : plan (ladder) -> For-loop[attempt +
  stop_after_if] -> finalize. Data->raw/rejected, manifest->metadata.'
value:
  modules:
    - id: plan
      value:
        type: rawscript
        content: '!inline plan.inline_script.py'
        input_transforms:
          configuration_version:
            type: javascript
            expr: flow_input.configuration_version
          dataset:
            type: javascript
            expr: flow_input.dataset
          entry_rank:
            type: javascript
            expr: flow_input.entry_rank
          max_rank:
            type: javascript
            expr: flow_input.max_rank
          source:
            type: javascript
            expr: flow_input.source
          url:
            type: javascript
            expr: flow_input.url
        lock: '!inline plan.inline_script.lock'
        language: python3
    - id: loop
      value:
        type: forloopflow
        modules:
          - id: attempt
            value:
              type: rawscript
              content: '!inline attempt.inline_script.py'
              input_transforms:
                configuration_version:
                  type: javascript
                  expr: results.plan.configuration_version
                dataset:
                  type: javascript
                  expr: results.plan.dataset
                is_last:
                  type: javascript
                  expr: flow_input.iter.index == results.plan.ladder.length - 1
                rank:
                  type: javascript
                  expr: flow_input.iter.value
                source:
                  type: javascript
                  expr: results.plan.source
                url:
                  type: javascript
                  expr: results.plan.url
              lock: '!inline attempt.inline_script.lock'
              language: python3
              tag: chromium
            stop_after_if:
              expr: result.chosen == true
              skip_if_stopped: false
        iterator:
          type: javascript
          expr: results.plan.ladder
        parallel: false
        skip_failures: false
    - id: finalize
      value:
        type: rawscript
        content: '!inline finalize.inline_script.py'
        input_transforms:
          attempts:
            type: javascript
            expr: results.loop
        lock: '!inline finalize.inline_script.lock'
        language: python3
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    configuration_version:
      type: string
      default: v1
    dataset:
      type: string
      default: pages
    entry_rank:
      type: string
      default: auto
      enum:
        - auto
        - http
        - curl_cffi
        - browser
        - stealth
    max_rank:
      type: string
      default: stealth
      enum:
        - http
        - curl_cffi
        - browser
        - stealth
    source:
      type: string
      default: web
    url:
      type: string
  required:
    - url
