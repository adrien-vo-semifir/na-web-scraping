summary: Crawl — pipeline conditionnel (site | liste) -> acquisition [nœuds
  Branch + For-loop]
description: Condition site|liste en nœud Branch natif + boucle For-loop natif
  (visibles dans l'éditeur).
value:
  modules:
    - id: route
      value:
        type: branchone
        branches:
          - summary: site → mini-crawl liens
            modules:
              - id: crawl_site
                value:
                  type: rawscript
                  content: '!inline crawl_site.inline_script.py'
                  input_transforms:
                    max_links:
                      type: javascript
                      expr: flow_input.max_links
                    site:
                      type: javascript
                      expr: flow_input.site
                  lock: '!inline crawl_site.inline_script.lock'
                  language: python3
            expr: flow_input.kind == "site"
            parallel: true
            skip_failure: true
        default:
          - id: seeds
            value:
              type: rawscript
              content: '!inline seeds.inline_script.py'
              input_transforms:
                urls:
                  type: javascript
                  expr: flow_input.urls
              lock: '!inline seeds.inline_script.lock'
              language: python3
    - id: loop
      value:
        type: forloopflow
        modules:
          - id: acq
            value:
              type: flow
              input_transforms:
                configuration_version:
                  type: static
                  value: v1
                dataset:
                  type: static
                  value: pages
                entry_rank:
                  type: static
                  value: auto
                max_rank:
                  type: static
                  value: stealth
                source:
                  type: static
                  value: web
                url:
                  type: javascript
                  expr: flow_input.iter.value
              path: u/admin/acquisition
        iterator:
          type: javascript
          expr: results.route.urls
        parallel: true
        parallelism:
          type: static
          value: 3
        skip_failures: true
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    kind:
      type: string
      default: list
      enum:
        - list
        - site
    max_links:
      type: integer
      default: 5
    site:
      type: string
      default: ''
    urls:
      type: array
      default: []
      items:
        type: string
  required: []
