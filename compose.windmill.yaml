# Stack WINDMILL — POC d'ÉVALUATION (alternative à Temporal pour le module web-scraping).
#
# Autonome et ISOLÉE de la stack Temporal (compose.yaml) : projet, réseau et Postgres
# dédiés, un seul port publié. Permet de COMPARER Windmill (orchestration + workers
# polyglottes Python/TS/Go/Bash, éditeur visuel) en parallèle, sans aucun couplage.
#
#   docker compose -f compose.windmill.yaml up -d        → UI sur http://localhost:8090
#   docker compose -f compose.windmill.yaml logs -f       → suivre
#   docker compose -f compose.windmill.yaml down -v       → stop + purge des volumes
#
# Base : compose officiel Windmill au tag v1.742.0 (dernière stable). Images épinglées :
# windmill & windmill-extra en 1.742.0 (existence vérifiée sur ghcr) ; caddy-l4 = latest
# (aucun tag versionné publié en amont pour ce proxy).
name: web-scraping-windmill

# Anchor d'image : une seule source de version pour serveur + workers + indexer.
x-windmill-image: &windmill_image ghcr.io/windmill-labs/windmill:${WINDMILL_VERSION:-1.742.0}

# Rotation des logs (les workers Windmill sont bavards).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-20m}"
    max-file: "${LOG_MAX_FILE:-10}"

networks:
  windmill_net:
    driver: bridge
  carto_lake:
    external: true        # le LAC partagé (cf. compose.infra.yaml) : `docker network create carto_lake`

volumes:
  windmill_db_data:
  worker_dependency_cache:
  worker_logs:
  windmill_index:
  lsp_cache:
  caddy_data:

services:
  # =================== Postgres (source de vérité Windmill) ===================
  db:
    image: postgres:${POSTGRES_VERSION:-16}   # 16 = version testée/supportée par Windmill
    shm_size: 1g
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: changeme              # credential JETABLE (POC local, DB non publiée)
      POSTGRES_DB: windmill
    volumes: [windmill_db_data:/var/lib/postgresql/data]
    networks: [windmill_net]
    expose: ["5432"]                           # interne uniquement (pas de port hôte)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # (Le LAC — seaweedfs — est désormais une infra PARTAGÉE : voir compose.infra.yaml + réseau carto_lake.)

  # =================== Plan de contrôle (API + UI) ===================
  windmill_server:
    image: *windmill_image
    restart: unless-stopped
    expose: ["8000", "2525"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:changeme@db/windmill?sslmode=disable}
      MODE: server
    depends_on:
      db: { condition: service_healthy }
    volumes: [worker_logs:/tmp/windmill/logs]
    networks: [windmill_net]
    logging: *default-logging

  # =================== Workers (groupe "default") ===================
  windmill_worker:
    image: *windmill_image
    deploy:
      replicas: 1                              # POC : 1 worker ; scale -> `--scale windmill_worker=N`
      resources:
        limits: { memory: 2048M }
    restart: unless-stopped
    privileged: true                           # isolation PID (FAVOR_UNSHARE_PID) — cf. doc sécurité Windmill
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:changeme@db/windmill?sslmode=disable}
      MODE: worker
      WORKER_GROUP: default
      FAVOR_UNSHARE_PID: "true"
    depends_on:
      db: { condition: service_healthy }
    volumes:
      - worker_dependency_cache:/tmp/windmill/cache
      - worker_logs:/tmp/windmill/logs
    networks: [windmill_net]
    logging: *default-logging

  # =================== Worker "native" (jobs légers in-process) ===================
  windmill_worker_native:
    image: *windmill_image
    deploy:
      replicas: 1
      resources:
        limits: { memory: 2048M }
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:changeme@db/windmill?sslmode=disable}
      MODE: worker
      WORKER_GROUP: native
      NATIVE_MODE: "true"
      SLEEP_QUEUE: "200"
    depends_on:
      db: { condition: service_healthy }
    volumes: [worker_logs:/tmp/windmill/logs]
    networks: [windmill_net]
    logging: *default-logging

  # =================== Worker "browser" (rang N3 — Playwright/chromium) — profil opt-in ===================
  windmill_worker_browser:
    profiles: ["browser"]            # opt-in (image avec chromium) : `--profile browser`
    build:
      context: docker/windmill-browser
      dockerfile: Dockerfile
      args:
        WINDMILL_VERSION: ${WINDMILL_VERSION:-1.742.0}
    deploy:
      resources:
        limits: { memory: 2048M }
    restart: unless-stopped
    privileged: true
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:changeme@db/windmill?sslmode=disable}
      MODE: worker
      WORKER_GROUP: reports          # groupe dédié (pattern officiel Windmill)
      WORKER_TAGS: chromium          # ne sert QUE les jobs taggés "chromium" (rang N3)
      # Sink S3 -> le LAC PARTAGÉ (seaweedfs sur carto_lake, compose.infra.yaml). Prod = Ceph RGW.
      S3_ENDPOINT: ${WM_S3_ENDPOINT:-http://seaweedfs:8333}
      S3_BUCKET: ${S3_BUCKET:-lake}          # lac unique ; zones en préfixes (raw/ staging/ curated/ …)
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-any}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-any}
      # Windmill ISOLE l'env des jobs : il faut whitelister les variables exposées aux scripts.
      WHITELIST_ENVS: S3_ENDPOINT,S3_BUCKET,S3_REGION,S3_ACCESS_KEY_ID,S3_SECRET_ACCESS_KEY
    depends_on:
      db: { condition: service_healthy }
    volumes: [worker_logs:/tmp/windmill/logs]
    networks: [windmill_net, carto_lake]       # carto_lake = accès au lac partagé
    logging: *default-logging

  # =================== Indexer recherche plein-texte (Enterprise) — désactivé ===================
  windmill_indexer:
    image: *windmill_image
    deploy:
      replicas: 0                              # passer à 1 pour activer (fonctionnalité EE)
    restart: unless-stopped
    expose: ["8002"]
    environment:
      PORT: "8002"
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:changeme@db/windmill?sslmode=disable}
      MODE: indexer
    depends_on:
      db: { condition: service_healthy }
    volumes:
      - windmill_index:/tmp/windmill/search
      - worker_logs:/tmp/windmill/logs
    networks: [windmill_net]
    logging: *default-logging

  # =================== Services extra : LSP (éditeur) ; Multiplayer = EE (off) ===================
  windmill_extra:
    image: ghcr.io/windmill-labs/windmill-extra:${WINDMILL_VERSION:-1.742.0}
    restart: unless-stopped
    expose: ["3001", "3002", "3003"]
    environment:
      ENABLE_LSP: "true"
      ENABLE_MULTIPLAYER: "false"              # collaboration temps réel = Enterprise Edition
      ENABLE_DEBUGGER: "true"
      DEBUGGER_PORT: "3003"
      ENABLE_NSJAIL: "false"
      REQUIRE_SIGNED_DEBUG_REQUESTS: "true"    # NE PAS désactiver sur une instance exposée
      WINDMILL_BASE_URL: http://windmill_server:8000
    volumes: [lsp_cache:/pyls/.cache]
    networks: [windmill_net]
    logging: *default-logging

  # =================== Reverse-proxy (UI + websockets LSP) ===================
  caddy:
    image: ghcr.io/windmill-labs/caddy-l4:${CADDY_L4_VERSION:-latest}   # seul tag publié en amont
    restart: unless-stopped
    depends_on: [windmill_server, windmill_extra]
    volumes:
      - ./docker/windmill/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    ports:
      - "${WINDMILL_PORT:-8090}:80"            # UI Windmill
    environment:
      BASE_URL: ":80"
    networks: [windmill_net]
    logging: *default-logging
