# Infra PARTAGÉE du POC web-scraping : le LAC (store objet S3), commun aux deux orchestrateurs.
#
# Source de vérité UNIQUE du raw — comme Ceph RGW en production : un store EXTERNE partagé,
# jamais « possédé » par un orchestrateur. SeaweedFS au POC ; Ceph RGW en prod (même API S3).
# Les stacks Temporal et Windmill rejoignent le réseau `carto_lake` et écrivent dans s3://lake/raw/…
#
#   docker network create carto_lake             # le réseau du lac (UNE seule fois)
#   docker compose -f compose.infra.yaml up -d    # démarre le lac (S3 :8333, explorateur/filer :8888, master :9333)
name: web-scraping-infra

networks:
  carto_lake:
    external: true        # créé hors compose : `docker network create carto_lake`

volumes:
  lake_data:

services:
  # Le LAC : SeaweedFS (POC) ↔ Ceph RGW (prod), même API S3. Bucket `lake`, zones en préfixes.
  seaweedfs:
    image: chrislusf/seaweedfs:${SEAWEEDFS_VERSION:-latest}
    restart: unless-stopped
    command: "server -s3 -dir=/data"
    volumes: [lake_data:/data]
    networks: [carto_lake]
    # 8333 = API S3 · 8888 = filer (explorateur de fichiers : http://localhost:8888/buckets/lake/) · 9333 = master (topologie)
    ports: ["${S3_PORT:-8333}:8333", "${S3_FILER_PORT:-8888}:8888", "${S3_UI_PORT:-9333}:9333"]

  # Provisionnement IDEMPOTENT du lac (bucket + zones, cf. docker/lake/zones.json) : repasse à
  # chaque `up` sans risque. One-shot (restart:no) ; attend SeaweedFS puis crée bucket + zones.
  lake-init:
    build: docker/lake
    depends_on: [seaweedfs]
    restart: "no"
    networks: [carto_lake]
    environment:
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: ${S3_BUCKET:-lake}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-any}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-any}
      S3_REGION: ${S3_REGION:-us-east-1}
